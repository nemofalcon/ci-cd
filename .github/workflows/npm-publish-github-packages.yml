name: Node Github CI

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20]

    steps:
    - name: Log initial DNS configuration
      run: cat /etc/resolv.conf

    - name: Configure DNS
      run: |
        echo "nameserver 1.1.1.1" | sudo tee /etc/resolv.conf > /dev/null
        echo "nameserver 8.8.8.8" | sudo tee -a /etc/resolv.conf > /dev/null
        echo "nameserver 9.9.9.9" | sudo tee -a /etc/resolv.conf > /dev/null

    - name: Log DNS configuration after change
      run: cat /etc/resolv.conf

    - name: Network Diagnostics
      run: |
        ip a
        ip route
        ping -c 4 google.com
        nslookup google.com

    - name: Retry DNS Resolution
      run: |
        for i in {1..5}; do nslookup google.com && break || sleep 2; done

    - uses: actions/checkout@v2

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v1
      with:
        node-version: ${{ matrix.node-version }}

    - name: npm install and test
      run: |
        npm install
        npm test
      env:
        CI: true

  deploy:
    needs: [test]
    runs-on: ubuntu-latest

    steps:
    - name: Log initial DNS configuration
      run: cat /etc/resolv.conf

    - name: Configure DNS
      run: |
        echo "nameserver 1.1.1.1" | sudo tee /etc/resolv.conf > /dev/null
        echo "nameserver 8.8.8.8" | sudo tee -a /etc/resolv.conf > /dev/null
        echo "nameserver 9.9.9.9" | sudo tee -a /etc/resolv.conf > /dev/null

    - name: Log DNS configuration after change
      run: cat /etc/resolv.conf

    - name: Network Diagnostics
      run: |
        ip a
        ip route
        ping -c 4 google.com
        nslookup google.com

    - name: Retry DNS Resolution
      run: |
        for i in {1..5}; do nslookup google.com && break || sleep 2; done

    - name: SSH and deploy node app
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          cd /ci-cd
          git pull origin master
          npm install --production
          pm2 restart node-app
